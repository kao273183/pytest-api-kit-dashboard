AWSTemplateFormatVersion: "2010-09-09"
Description: >
  pytest-api-kit-dashboard — Cognito-gated self-service trigger panel.

  Provisions Cognito User Pool + Hosted UI, API Gateway HTTP API with a JWT
  authorizer, Lambda function with VPC config (for stable NAT egress IP), and
  IAM roles wired to a Secrets Manager entry holding a GitHub PAT.

Parameters:
  ProjectName:
    Type: String
    Default: api-test-dashboard
    Description: Resource name prefix.

  GithubOwner:
    Type: String
    Description: GitHub org or username that owns the workflow repos.

  AllowedRepos:
    Type: CommaDelimitedList
    Description: Comma-separated list of allowed repo names.
    # Example: "api-tests,ui-tests"

  WorkflowMapJson:
    Type: String
    Description: JSON mapping repo -> workflow filename.
    # Example: '{"api-tests":"smoke.yml","ui-tests":"e2e.yml"}'

  WorkflowInputsMapJson:
    Type: String
    Default: "{}"
    Description: >
      (Optional) JSON mapping repo -> list of allowed workflow_dispatch input
      keys. When empty, the Lambda forwards every key from the POST body
      except {repo, ref}. Example:
      '{"api-tests":["environment","pytest_args"]}'

  GithubPatSecretArn:
    Type: String
    Description: ARN of the Secrets Manager secret holding `{"token":"ghp_..."}`.

  CognitoDomainPrefix:
    Type: String
    Description: >
      Globally unique prefix for the Cognito Hosted UI domain. Final URL will
      be `<prefix>.auth.<region>.amazoncognito.com`.

  DashboardRoot:
    Type: String
    Description: Dashboard home URL (e.g. https://d1abc.cloudfront.net/).

  DashboardOrigin:
    Type: String
    Description: Dashboard scheme + host for CORS (no trailing slash).

  CallbackUrl:
    Type: String
    Description: Trigger-panel page URL (Cognito callback target).

  AdminEmails:
    Type: CommaDelimitedList
    Description: Emails unconditionally granted admin role (belt-and-braces).

  VpcId:
    Type: String
    Description: >
      VPC where Lambda attaches. Required because dispatching through a stable
      NAT egress IP lets you allow-list the function in org-level IP filters.

  LambdaSubnetIds:
    Type: CommaDelimitedList
    Description: Private subnets with NAT route to 0.0.0.0/0.

  SlackWebhookUrl:
    Type: String
    NoEcho: true
    Default: ""
    Description: (Optional) Slack webhook for "new user created" notifications.

Resources:

  # --------------------------------------------------------------------------
  # Cognito
  # --------------------------------------------------------------------------
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "${ProjectName}-pool"
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
        InviteMessageTemplate:
          EmailSubject: !Sub "[${ProjectName}] Your account has been created"
          EmailMessage: |
            Hi,<br/><br/>
            You've been added to the <b>{ProjectName}</b> dashboard.<br/><br/>
            <b>Username</b>: {username}<br/>
            <b>Temporary password</b>: <code>{####}</code><br/><br/>
            Please change your password immediately after first login.<br/><br/>
            <i>Automated message — do not reply.</i>
          SMSMessage: "{ProjectName} account {username}. Temp password: {####}"
      AutoVerifiedAttributes: [email]
      UsernameAttributes: [email]
      EmailConfiguration:
        EmailSendingAccount: COGNITO_DEFAULT
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref UserPool
      ClientName: !Sub "${ProjectName}-client"
      GenerateSecret: false
      AllowedOAuthFlows: [implicit]
      AllowedOAuthScopes: [openid, email]
      AllowedOAuthFlowsUserPoolClient: true
      CallbackURLs:
        - !Ref CallbackUrl
        - !Ref DashboardRoot
        - !Sub "${DashboardRoot}index.html"
      LogoutURLs:
        - !Ref CallbackUrl
        - !Ref DashboardRoot
        - !Sub "${DashboardRoot}index.html"
      SupportedIdentityProviders: [COGNITO]
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Ref CognitoDomainPrefix
      UserPoolId: !Ref UserPool

  GroupAdmin:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: admin
      Description: Full access — trigger tests and manage users
      UserPoolId: !Ref UserPool
      Precedence: 1

  GroupTester:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: tester
      Description: Can trigger tests (no user management)
      UserPoolId: !Ref UserPool
      Precedence: 2

  GroupViewer:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: viewer
      Description: Read-only — view reports, cannot trigger
      UserPoolId: !Ref UserPool
      Precedence: 3

  # --------------------------------------------------------------------------
  # Lambda
  # --------------------------------------------------------------------------
  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Egress-only SG for the trigger Lambda
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS to GitHub API / AWS endpoints via NAT
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-lambda-sg"

  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
        - PolicyName: ReadGithubPat
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Ref GithubPatSecretArn
        - PolicyName: ManageCognitoUsers
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:ListUsers
                  - cognito-idp:AdminCreateUser
                  - cognito-idp:AdminSetUserPassword
                  - cognito-idp:AdminDeleteUser
                  - cognito-idp:AdminDisableUser
                  - cognito-idp:AdminEnableUser
                  - cognito-idp:AdminAddUserToGroup
                  - cognito-idp:AdminRemoveUserFromGroup
                  - cognito-idp:AdminListGroupsForUser
                  - cognito-idp:ListUsersInGroup
                Resource: !GetAtt UserPool.Arn

  TriggerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-trigger"
      Runtime: python3.11
      Handler: trigger_test.handler
      Role: !GetAtt LambdaRole.Arn
      Timeout: 20
      MemorySize: 256
      VpcConfig:
        SubnetIds: !Ref LambdaSubnetIds
        SecurityGroupIds: [!Ref LambdaSecurityGroup]
      Environment:
        Variables:
          GITHUB_PAT_SECRET_ARN: !Ref GithubPatSecretArn
          GITHUB_OWNER: !Ref GithubOwner
          ALLOWED_REPOS: !Join [",", !Ref AllowedRepos]
          WORKFLOW_MAP: !Ref WorkflowMapJson
          WORKFLOW_INPUTS_MAP: !Ref WorkflowInputsMapJson
          USER_POOL_ID: !Ref UserPool
          ADMIN_EMAILS: !Join [",", !Ref AdminEmails]
          SLACK_WEBHOOK_URL: !Ref SlackWebhookUrl
          DASHBOARD_URL: !Ref DashboardRoot
          PROJECT_NAME: !Ref ProjectName
      Code:
        ZipFile: |
          def handler(event, ctx):
              return {"statusCode": 200, "body": "placeholder - run deploy.sh to upload real code"}

  # --------------------------------------------------------------------------
  # API Gateway HTTP API + JWT authorizer
  # --------------------------------------------------------------------------
  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub "${ProjectName}-api"
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins: [!Ref DashboardOrigin]
        AllowMethods: [GET, POST, PUT, DELETE, OPTIONS]
        AllowHeaders: [authorization, content-type]
        MaxAge: 600

  JwtAuthorizer:
    Type: AWS::ApiGatewayV2::Authorizer
    Properties:
      ApiId: !Ref HttpApi
      Name: CognitoJwt
      AuthorizerType: JWT
      IdentitySource: ["$request.header.Authorization"]
      JwtConfiguration:
        Audience: [!Ref UserPoolClient]
        Issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}"

  LambdaIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt TriggerFunction.Arn
      PayloadFormatVersion: "2.0"

  RouteTrigger:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "POST /trigger"
      AuthorizationType: JWT
      AuthorizerId: !Ref JwtAuthorizer
      Target: !Sub "integrations/${LambdaIntegration}"

  RouteRuns:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "GET /runs"
      AuthorizationType: JWT
      AuthorizerId: !Ref JwtAuthorizer
      Target: !Sub "integrations/${LambdaIntegration}"

  RouteRunById:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "GET /runs/{id}"
      AuthorizationType: JWT
      AuthorizerId: !Ref JwtAuthorizer
      Target: !Sub "integrations/${LambdaIntegration}"

  RouteRunLogs:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "GET /runs/{id}/logs"
      AuthorizationType: JWT
      AuthorizerId: !Ref JwtAuthorizer
      Target: !Sub "integrations/${LambdaIntegration}"

  RouteAdminUsersList:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "GET /admin/users"
      AuthorizationType: JWT
      AuthorizerId: !Ref JwtAuthorizer
      Target: !Sub "integrations/${LambdaIntegration}"

  RouteAdminUsersCreate:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "POST /admin/users"
      AuthorizationType: JWT
      AuthorizerId: !Ref JwtAuthorizer
      Target: !Sub "integrations/${LambdaIntegration}"

  RouteAdminUsersDelete:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "DELETE /admin/users/{email}"
      AuthorizationType: JWT
      AuthorizerId: !Ref JwtAuthorizer
      Target: !Sub "integrations/${LambdaIntegration}"

  RouteAdminUserRole:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "PUT /admin/users/{email}/role"
      AuthorizationType: JWT
      AuthorizerId: !Ref JwtAuthorizer
      Target: !Sub "integrations/${LambdaIntegration}"

  RouteOptions:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "OPTIONS /{proxy+}"
      Target: !Sub "integrations/${LambdaIntegration}"

  ApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: "$default"
      AutoDeploy: true

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref TriggerFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*"

Outputs:
  ApiEndpoint:
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
    Description: Paste into CONFIG.apiEndpoint in trigger-panel.html
  UserPoolId:
    Value: !Ref UserPool
  UserPoolClientId:
    Value: !Ref UserPoolClient
    Description: Paste into CONFIG.cognitoClientId in trigger-panel.html
  CognitoHostedUiDomain:
    Value: !Sub "${CognitoDomainPrefix}.auth.${AWS::Region}.amazoncognito.com"
    Description: Paste into CONFIG.cognitoDomain in trigger-panel.html
